name: train_realesrgan_siamese_improved_ver2
model_type: RealESRGANSiameseModel
num_gpu: 1
scale: 4
manual_seed: 0

datasets:
  train:
    name: TrainSiamese
    type: PairedSiameseImageDataset
    phase: train
    dataroot_gt: /home/namlh/data/dataset/train
    dataroot_lq_a: /home/namlh/data/dataset/train
    dataroot_lq_b: /home/namlh/data/dataset/train
    meta_info_file: /home/namlh/data/dataset/meta_info/meta_info_triplet_ver1.txt
    io_backend:
      type: disk
    gt_size: 256
    max_retry: 3
    use_hflip: true
    use_rot: true
    scale: 4
    # Remove normalization - keep images in [0,1] range
    # mean: [0.0, 0.0, 0.0]  # Commented out
    # std: [1.0, 1.0, 1.0]   # Commented out
    
    # Enhanced augmentation
    color_jitter: true
    blur_prob: 0.1
    noise_prob: 0.05
    
    # Dataloader settings
    num_workers: 6
    use_shuffle: true
    batch_size_per_gpu: 12  # Reduced for stability
    num_worker_per_gpu: 6
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val:
    name: ValSet5  
    type: PairedImageDataset 
    dataroot_gt: /home/namlh/data/benchmark_datasets/Set5/Set5/GTmod12
    dataroot_lq: /home/namlh/data/benchmark_datasets/Set5/Set5/LRbicx4
    io_backend:
      type: disk

network_g:
  type: RRDBNetFeatOut
  num_in_ch: 3
  num_out_ch: 3
  scale: 4
  num_feat: 64
  num_block: 23
  num_grow_ch: 32
  return_intermediate: true 

network_d:
  type: UNetDiscriminatorSN
  num_in_ch: 3
  num_feat: 64

path:
  # Load pretrained Real-ESRGAN for initialization
  pretrain_network_g: /home/namlh/DLEnhance_ImageQuality/Real-ESRGAN/weights/net_g_455000.pth
  param_key_g: params_ema
  strict_load_g: false  # Allow partial loading
  resume_state: ~
train:
  ema_decay: 0.999
  
  # Improved optimizer settings
  optim_g:
    type: Adam
    lr: !!float 1e-4  # Lower learning rate for stability
    weight_decay: 0
    betas: [0.9, 0.999]
    
  optim_d:
    type: Adam
    lr: !!float 1e-4  # Match generator LR
    weight_decay: 0
    betas: [0.9, 0.999]

  scheduler:
    type: MultiStepLR
    milestones: [200000, 400000, 500000]
    gamma: 0.5

  total_iter: 600000
  warmup_iter: 10000  # Warmup period

  # Loss configuration
  pixel_opt:
    type: L1Loss
    loss_weight: 2.0
    reduction: mean

  perceptual_opt:
    type: PerceptualLoss
    layer_weights:
      'conv1_2': 0.1
      'conv2_2': 0.1  
      'conv3_4': 1.0
      'conv4_4': 1.0
      'conv5_4': 1.0
    vgg_type: vgg19
    use_input_norm: true
    range_norm: false
    perceptual_weight: 1.2
    style_weight: 1.0

  gan_opt:
    type: GANLoss
    gan_type: vanilla
    real_label_val: 1.0
    fake_label_val: 0.0
    loss_weight: 0.5

  # Enhanced Knowledge Distillation settings
  progressive_kd: true
  warmup_kd_iters: 40000
  lambda_kd_out: 0.15      # Increased from 0.05
  lambda_kd_feat: 0.15
  lambda_consistency: 0.075   # Increased from

val:
    val_freq: 5000.0
    save_img: True
    metrics:
      psnr:
        type: calculate_psnr
        crop_border: 4
        test_y_channel: True
      
      ssim:
        type: calculate_ssim
        crop_border: 4
        test_y_channel: True
      
  
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# Distributed training
dist_params:
  backend: nccl