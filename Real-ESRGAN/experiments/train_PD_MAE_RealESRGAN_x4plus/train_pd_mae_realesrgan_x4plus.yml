# GENERATE TIME: Fri May 22 18:48:30 2026
# CMD:
# Real-ESRGAN/realesrgan/train.py -opt Real-ESRGAN/options/train_pd_mae_realesrgan_x4plus.yml --launcher none

# general settings
name: train_PD_MAE_RealESRGAN_x4plus
model_type: RealESRGANModel
scale: 4
num_gpu: 1  # single RTX 4500 GPU
manual_seed: 0

high_order_degradation: false

# USM ground-truth targets (read at opt root by RealESRGANModel)
l1_gt_usm: true
percep_gt_usm: true
gan_gt_usm: false
mae_weight: 0.1

# dataset and data loader settings
datasets:
  train:
    name: PD_MAE_DF2K
    type: PairedImageDataset
    dataroot_gt: ~/data/dataset/train/HR_sub
    dataroot_lq: ~/data/dataset/train/LR_all_sub
    filename_tmpl: '{}'
    io_backend:
      type: disk
    gt_size: 256
    use_hflip: True
    use_rot: False
    val_freq: !!float 5e3

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 8
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  # validation dataset
  val:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: ~/data/benchmark_datasets/Set14/Set14/GTmod12
    dataroot_lq: ~/data/benchmark_datasets/Set14/Set14/LRbicx4
    filename_tmpl: '{}'
    io_backend:
      type: disk
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

# network structures
network_g:
  type: RRDBNet
  num_in_ch: 3
  num_out_ch: 3
  num_feat: 64
  num_block: 23
  num_grow_ch: 32
  scale: 4
  use_sft: true
  img_size: 256
  mae_checkpoint: ~/data/dataset/train/PD_MAE_Checkpoints_Stage2/pd_mae_s2_iter100000.pth

network_d:
  type: UNetDiscriminatorSN
  num_in_ch: 3
  num_feat: 64
  skip_connection: True

# path
path:
  pretrain_network_g: ~/DLEnhance_ImageQuality/Real-ESRGAN/experiments/pretrained_models/RealESRNet_x4plus.pth
  param_key_g: params_ema
  strict_load_g: false
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]
  optim_d:
    type: Adam
    lr: !!float 1e-4
    weight_decay: 0
    betas: [0.9, 0.99]
  scheduler:
    type: MultiStepLR
    milestones: [400000]
    gamma: 0.5

  total_iter: 400000
  warmup_iter: -1  # no warm up

  # losses
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean
  perceptual_opt:
    type: PerceptualLoss
    layer_weights:
      'conv1_2': 0.1
      'conv2_2': 0.1
      'conv3_4': 1
      'conv4_4': 1
      'conv5_4': 1
    vgg_type: vgg19
    use_input_norm: true
    perceptual_weight: !!float 1.0
    style_weight: 0
    range_norm: false
    criterion: l1
  gan_opt:
    type: GANLoss
    gan_type: vanilla
    real_label_val: 1.0
    fake_label_val: 0.0
    loss_weight: !!float 1e-1

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: PD-MAE-RealESRGAN
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
