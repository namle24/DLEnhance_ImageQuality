name: test_DRCT_bicubic_x4
model_type: DRCTModel
scale: 4
num_gpu: 1
manual_seed: 0

datasets:
  test_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /storage/student12/namlh/data/benchmark_datasets/Set5/Set5/GTmod12
    dataroot_lq: /storage/student12/namlh/data/benchmark_datasets/Set5/Set5/LRbicx4
    io_backend:
      type: disk

  test_2:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /storage/student12/namlh/data/benchmark_datasets/Set14/Set14/GTmod12
    dataroot_lq: /storage/student12/namlh/data/benchmark_datasets/Set14/Set14/LRbicx4
    io_backend:
      type: disk

  test_3:
    name: BSDS100
    type: PairedImageDataset
    dataroot_gt: /storage/student12/namlh/data/benchmark_datasets/BSDS100/BSDS100
    dataroot_lq: /storage/student12/namlh/data/benchmark_datasets/BSDS100/BSD100_LQ
    io_backend:
      type: disk

  test_4:
    name: urban100
    type: PairedImageDataset
    dataroot_gt: /storage/student12/namlh/data/benchmark_datasets/urban100/urban100
    dataroot_lq: /storage/student12/namlh/data/benchmark_datasets/urban100/urban100_LQ
    io_backend:
      type: disk

# network structures
network_g:
  type: DRCT
  upscale: 4
  in_chans: 3
  img_size: 64
  window_size: 16
  compress_ratio: 3
  squeeze_factor: 30
  conv_scale: 0.01
  overlap_ratio: 0.5
  img_range: 1.0
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: pixelshuffle
  resi_connection: 1conv
  # ---- Note: Change these dynamically depending on whether testing Baseline or PD-MAE-DRCT ----
  use_sft: false
  mae_checkpoint: ~

# path
path:
  pretrain_network_g: ~
  strict_load_g: true
  param_key_g: params

# validation settings
val:
  save_img: true
  suffix: ~

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
