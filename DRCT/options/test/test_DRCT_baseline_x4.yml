# ============================================================
# TEST CONFIG: DRCT Baseline (no SFT, no MAE)
# ============================================================
# Usage:
#   python DRCT/drct/test.py -opt DRCT/options/test/test_DRCT_baseline_x4.yml
# ============================================================
name: test_DRCT_baseline_x4
model_type: DRCTModel
scale: 4
num_gpu: 1
manual_seed: 0

datasets:
  test_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: ~/data/benchmark_datasets/Set5/Set5/GTmod12
    dataroot_lq: ~/data/benchmark_datasets/Set5/Set5/LRbicx4
    io_backend:
      type: disk

  test_2:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: ~/data/benchmark_datasets/Set14/Set14/GTmod12
    dataroot_lq: ~/data/benchmark_datasets/Set14/Set14/LRbicx4
    io_backend:
      type: disk

  test_3:
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: ~/data/benchmark_datasets/urban100/urban100
    dataroot_lq: ~/data/benchmark_datasets/urban100/urban100_LQ
    io_backend:
      type: disk

  test_4:
    name: BSDS100
    type: PairedImageDataset
    dataroot_gt: ~/data/benchmark_datasets/BSDS100/BSDS100
    dataroot_lq: ~/data/benchmark_datasets/BSDS100/BSD100_LQ
    io_backend:
      type: disk

  test_5:
    name: RealSR_Canon
    type: PairedImageDataset
    dataroot_gt: ~/data/benchmark_datasets/RealSR(V3)/Canon/HR
    dataroot_lq: ~/data/benchmark_datasets/RealSR(V3)/Canon/LR
    io_backend:
      type: disk

  test_6:
    name: RealSR_Nikon
    type: PairedImageDataset
    dataroot_gt: ~/data/benchmark_datasets/RealSR(V3)/Nikon/HR
    dataroot_lq: ~/data/benchmark_datasets/RealSR(V3)/Nikon/LR
    io_backend:
      type: disk

# network structures — MUST match training config exactly
network_g:
  type: DRCT
  upscale: 4
  in_chans: 3
  img_size: 64
  window_size: 16
  compress_ratio: 3
  squeeze_factor: 30
  conv_scale: 0.01
  overlap_ratio: 0.5
  img_range: 1.0
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: pixelshuffle
  resi_connection: 1conv
  # ---- KEY: No SFT for baseline ----
  use_sft: false
  mae_checkpoint: ~

# path — Baseline checkpoint
path:
  pretrain_network_g: ~/DLEnhance_ImageQuality/DRCT/experiments/train_DRCT_baseline_x4/models/net_g_500000.pth
  strict_load_g: true
  param_key_g: ~

# validation settings
val:
  save_img: true
  suffix: ~

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
