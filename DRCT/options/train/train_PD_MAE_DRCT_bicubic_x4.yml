# general settings
name: train_PD_MAE_DRCT_bicubic_x4
model_type: DRCTModel
scale: 4
num_gpu: auto
manual_seed: 0
mae_weight: 0.05

# dataset and data loader settings
datasets:
  train:
    name: DF2K
    type: PairedImageDataset
    dataroot_gt: /data/home/namlh/data/dataset/train/DF2K/HR
    dataroot_lq: /data/home/namlh/data/dataset/train/DF2K/LR_bicubic_X4
    io_backend:
      type: disk

    gt_size: 256
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 6
    batch_size_per_gpu: 4
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: /data/home/namlh/data/benchmark_datasets/Set5/Set5/GTmod12
    dataroot_lq: /data/home/namlh/data/benchmark_datasets/Set5/Set5/LRbicx4
    io_backend:
      type: disk

  val_2:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: /data/home/namlh/data/benchmark_datasets/Set14/Set14/GTmod12
    dataroot_lq: /data/home/namlh/data/benchmark_datasets/Set14/Set14/LRbicx4
    io_backend:
      type: disk

# network structures
network_g:
  type: DRCT
  upscale: 4
  in_chans: 3
  img_size: 64
  window_size: 16
  compress_ratio: 3
  squeeze_factor: 30
  conv_scale: 0.01
  overlap_ratio: 0.5
  img_range: 1.0
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: pixelshuffle
  resi_connection: 1conv
  # ---- SFT + MAE Prior Enabled ----
  use_sft: true
  mae_checkpoint: /data/home/namlh/data/dataset/train/PD_MAE_Checkpoints_Stage2/pd_mae_s2_iter100000.pth

# path
path:
  pretrain_network_g: ~
  strict_load_g: false
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [250000, 400000, 450000, 475000]
    gamma: 0.5

  total_iter: 500000
  warmup_iter: -1

  # losses (L1 + perceptual + consistency loss weight via mae_weight)
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

  perceptual_opt:
    type: PerceptualLoss
    layer_weights:
      "conv3_4": 1.0
      "conv4_4": 1.0
      "conv5_4": 1.0
    vgg_type: vgg19
    use_input_norm: true
    perceptual_weight: !!float 1e-2
    style_weight: 0
    range_norm: false
    criterion: l1

# validation settings
val:
  val_freq: !!float 5e3
  save_img: true
  pbar: False

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
      better: higher
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
      better: higher

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
