# general settings
name: train_DRCT_baseline_x4
model_type: DRCTModel
scale: 4
num_gpu: auto
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: DF2K
    type: PairedImageDataset
    dataroot_gt: ~/data/dataset/train/HR_sub
    dataroot_lq: ~/data/dataset/train/LR_all_sub
    #meta_info_file: drct/data/meta_info/meta_info_DF2Ksub_GT.txt
    io_backend:
      type: disk

    gt_size: 256
    use_hflip: true
    use_rot: true

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 6
    batch_size_per_gpu: 4
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val_1:
    name: RealSR_Canon
    type: PairedImageDataset
    dataroot_gt: ~/data/benchmark_datasets/RealSR(V3)/Canon/HR
    dataroot_lq: ~/data/benchmark_datasets/RealSR(V3)/Canon/LR
    io_backend:
      type: disk

  val_2:
    name: RealSR_Nikon
    type: PairedImageDataset
    dataroot_gt: ~/data/benchmark_datasets/RealSR(V3)/Nikon/HR
    dataroot_lq: ~/data/benchmark_datasets/RealSR(V3)/Nikon/LR
    io_backend:
      type: disk

  val_3:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: ~/data/benchmark_datasets/Set5/Set5/GTmod12
    dataroot_lq: ~/data/benchmark_datasets/Set5/Set5/LRbicx4
    io_backend:
      type: disk

# network structures
network_g:
  type: DRCT
  upscale: 4
  in_chans: 3
  img_size: 64
  window_size: 16
  compress_ratio: 3
  squeeze_factor: 30
  conv_scale: 0.01
  overlap_ratio: 0.5
  img_range: 1.0
  depths: [6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: pixelshuffle
  resi_connection: 1conv
  use_sft: false
  mae_checkpoint: ~

# path
path:
  pretrain_network_g: ~
  strict_load_g: false
  # Phase 2: resume baseline 100k + perceptual (adjust folder name if needed)
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 2e-4
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: MultiStepLR
    milestones: [250000, 400000, 450000, 475000]
    gamma: 0.5

  total_iter: 500000
  warmup_iter: -1

  # losses (phase 2: L1 + perceptual, no MAE)
  pixel_opt:
    type: L1Loss
    loss_weight: 1.0
    reduction: mean

  perceptual_opt:
    type: PerceptualLoss
    layer_weights:
      "conv3_4": 1.0
      "conv4_4": 1.0
      "conv5_4": 1.0
    vgg_type: vgg19
    use_input_norm: true
    perceptual_weight: !!float 1e-2
    style_weight: 0
    range_norm: false
    criterion: l1

# validation settings
val:
  val_freq: !!float 5e3
  save_img: true
  pbar: False

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 3
      test_y_channel: true
      better: higher # the higher, the better. Default: higher
    ssim:
      type: calculate_ssim
      crop_border: 3
      test_y_channel: true
      better: higher # the higher, the better. Default: higher

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 5e3
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 29500
